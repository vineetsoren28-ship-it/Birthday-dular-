<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(270deg,#ff4e8a,#6a5acd,#ff1493);
background-size:600% 600%;
animation:bgMove 10s ease infinite;
color:white;
text-align:center;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:25px;
background:#ff4e8a;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{transform:scale(1.1);}

img{
width:80%;
max-width:300px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
margin-top:15px;
}

.heart{
position:fixed;
font-size:20px;
animation:floatUp 4s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

#scoreBoard{
font-size:18px;
margin-top:10px;
font-weight:bold;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div id="startPage">
<h1>Happy Birthday My Love ❤️</h1>
<p>Let's unlock our memories 💕</p>
<button onclick="startQuiz()">Start</button>
</div>

<div id="quizPage" style="display:none;">
<h3 id="scoreBoard">Score: 0</h3>
<h2 id="question"></h2>
<div id="options"></div>
<p id="result"></p>
<img id="memoryPhoto" style="display:none;">
<p id="wishText"></p>
</div>

<script>
let currentQuiz = 0;
let score = 0;

let quizData = [
{q:"Who is sukrii?", options:["You","Me"], answer:"You"},
{q:"Who loves more?", options:["You","Me"], answer:"Me"},
{q:"Our favorite color?", options:["Pink","Black"], answer:"Black"},
{q:"Who is cutest?", options:["You","Me"], answer:"You"},
{q:"Who says sorry first?", options:["You","Me"], answer:"Me"},
{q:"Who gets angry fast?", options:["You","Me"], answer:"You"},
{q:"Favorite word?", options:["Love","Bye"], answer:"Love"},
{q:"Who misses more?", options:["You","Me"], answer:"Me"},
{q:"Who is my world?", options:["You","Nobody"], answer:"You"},
{q:"Will you marry me? 💍", options:["Yes 💖","Of course 😘"], answer:"Yes 💖"}
];

let wishes = [
"You are my beginning ❤️",
"You make my world beautiful 💕",
"Your smile is my happiness 😊",
"You are my lucky charm ✨",
"Life is perfect with you 💖",
"I love your cute anger 😄",
"You are my safe place 💞",
"I miss you every second 💌",
"You are my forever 🌹",
"💍 The most special question!"
];

function startQuiz(){
document.getElementById("startPage").style.display="none";
document.getElementById("quizPage").style.display="block";
loadQuiz();
}

function loadQuiz(){
document.getElementById("result").innerHTML="";
document.getElementById("memoryPhoto").style.display="none";
document.getElementById("wishText").innerHTML="";

let data = quizData[currentQuiz];
document.getElementById("question").innerHTML="Quiz "+(currentQuiz+1)+": "+data.q;

let optionsHTML="";
data.options.forEach(opt=>{
optionsHTML+=`<button onclick="checkAnswer('${opt}')">${opt}</button>`;
});

document.getElementById("options").innerHTML=optionsHTML;
}

function checkAnswer(selected){
let correct = quizData[currentQuiz].answer;

// Always show photo & wish
let img = document.getElementById("memoryPhoto");
img.src = "photo"+(currentQuiz+1)+".jpg";
img.style.display = "block";

document.getElementById("wishText").innerHTML = wishes[currentQuiz];

createHearts();
firework();

if(selected === correct){
score += 10;
document.getElementById("scoreBoard").innerHTML = "Score: "+score;
document.getElementById("result").innerHTML = "Correct ❤️ Memory Unlocked!";
} else {
document.getElementById("result").innerHTML = "Wrong 💕 Memory Still Shown";
}

currentQuiz++;

if(currentQuiz < quizData.length){
setTimeout(loadQuiz,3000);
}else{
setTimeout(()=>{proposalCelebration();},3000);
}
}

function createHearts(){
for(let i=0;i<15;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}
}

///// FIREWORKS ///////
let canvas=document.getElementById("fireworks");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function firework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<30;i++){
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.beginPath();
ctx.arc(x+Math.random()*100-50,y+Math.random()*100-50,3,0,Math.PI*2);
ctx.fill();
}

setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),600);
}

///// PROPOSAL CELEBRATION LAST QUIZ /////
function proposalCelebration(){

// Fireworks
for(let i=0;i<40;i++){
let fire = document.createElement("div");
fire.innerHTML = "🎆";
fire.style.position = "fixed";
fire.style.left = Math.random()*100 + "vw";
fire.style.top = Math.random()*50 + "vh";
fire.style.fontSize = "30px";
fire.style.animation = "floatUp 3s linear forwards";
document.body.appendChild(fire);
setTimeout(()=>fire.remove(),3000);
}

// Roses falling
for(let i=0;i<30;i++){
let rose = document.createElement("div");
rose.innerHTML = "🌹";
rose.style.position = "fixed";
rose.style.left = Math.random()*100 + "vw";
rose.style.top = "-50px";
rose.style.fontSize = "25px";
rose.style.animation = "fall 4s linear forwards";
document.body.appendChild(rose);
setTimeout(()=>rose.remove(),4000);
}

// Final photo + note
let img=document.getElementById("memoryPhoto");
img.src="photo10.jpg";
img.style.display="block";

document.getElementById("wishText").innerHTML = 
"Dular ❤️<br>You are my forever, my always, my everything.<br>Will you stay with me for lifetime? 💍<br><br>Final Score: "+score+" 🎉<br>Happy Birthday My Love ❤️🎂";
}

</script>
</body>
</html>
